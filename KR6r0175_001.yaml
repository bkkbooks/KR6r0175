body:
  text: 唐太常少卿臨淄段成式柯古撰序貞元十七年先君自荊一作蘄入蜀應韋南康辟命南康王韋皐洎韋之暮年為賊闢讒構遂攝尉靈池縣韋尋薨賊闢知留後先君舊與闢不合聞之連夜離縣至城東門闢尋有帖不令諸縣官離縣其夕陰風及返出郭二里見火兩炬夾道百步為導初意縣吏迎候且恠其不前高下遠近不差欲及縣郭方滅及問縣吏尚未知府帖也時先君念金剛經已五六年數無虗日信乎至誠必感有感必應向之導火乃經所著迹也後闢逆節漸露詔以袁公滋為節度使成式再從叔少從軍知左營事懼及禍與監軍定計以蠟丸帛書通謀於袁事旋發悉為魚肉賊謂先君知其謀於時先君念經夜久不覺因寐門戶悉閉忽覺聞開戶而入言不畏者再三若物投案𪹼然有聲驚起之際音猶在耳顧視左右吏僕皆睡俾燭樺四索初無所見向之門扄已開闢矣先君受持此經十餘萬遍徵應事孔著成式近觀晉宋已來時人咸著傳記彰明其事又先命受持講解有唐已來金剛經靈驗記三卷成式當奉先命受持講解太和二年於揚州僧栖簡處聽平消御注一遍六年於荊州僧靖奢處聽大雲疏一遍開成元年於上都懷楚法師處聽青龍疏一遍復日念書寫猶希傳照罔極盡形流通摭拾遺逸以備闕佛事號金剛經鳩異張齊丘張鎰相公先君齊丘酷信釋氏每旦更新衣執經於像前念金剛經十五遍積數十年不懈永泰初為朔方節度使衙內有小將負罪懼事露乃扇動軍人數百定謀反叛齊丘因衙退於小廳閒行忽有兵數十露刃走入齊丘左右唯奴僕遽奔宅門過小廳數步迴顧又無人疑是鬼物將及門其妻女奴婢復呌呼出門云有兩甲士身出廳屋上時衙隊軍徤聞變持兵亂入至小廳前見十餘人仡然庭中垂手張口投兵於地眾遂擒縛五六人瘖不能言餘者具首云欲上廳忽見二甲士長數丈瞋目叱之初如中惡齊丘聞之因斷酒肉張鳳翔即予門吏盧邁親姨夫邁語予云虞候王某劉逸淮在汴時韓弘為右廂虞候王某為左廂虞候與弘相善或謂二人取軍情將不利於劉劉大怒俱召詰之弘即劉之甥因控地碎首大言劉意稍解王某年老股戰不能自辯劉叱令拉坐杖三十時新造赤棒頭徑數寸固以筋漆拉之不什數五六當死矣韓意其必死及昏造其家恠無哭聲又謂其懼不敢哭訪其門卒即云大使無恙弘素與熟遂至臥內問之王云我讀金剛經四十年矣今方得力言初被坐時見巨手如簸箕翕然遮背因袒示韓都無撻痕韓舊不好釋氏由此始與僧往來日自寫十紙乃積計數百軸矣後在中書盛暑有諫官因事謁見韓方洽汗寫經恠問之韓乃具道王某事予職在集仙常侍柳公為予說孫咸梁崇義在襄州未阻兵時有小將孫咸暴卒信宿却蘇夢至一處如王者所居儀衛甚嚴有吏引與一僧對事僧法號懷秀亡已經年在生極犯戒及入冥無善可錄乃紿云我常囑孫咸寫法華經故咸被追對咸初不省僧故執之經時不決忽見沙門曰地藏尊者語云弟子若招承亦自獲祐咸乃依言因得無事又說對勘時見一戎王衛者數百自外來冥王降階齊級升殿坐未久乃大風捲去又見一人被拷覆罪福此人常持金剛經又好食肉左邊有經數千軸右邊積肉成山以肉多將入重論俄經堆中有火一星飛向肉山頃刻銷盡此人遂履空而去咸問地藏向來外國王風吹何處地藏云彼王當入無間向來風即業風也因引咸看地獄及門烟焰扇赫聲若風雷懼不敢視臨回鑊湯跳沫滴落左股痛入心髓地藏乃令一吏送歸不許漏洩冥事及𢌞如夢妻兒環泣已一日矣遂破家寫經因請出家夢中所滴處成瘡終身不差僧智燈貞元中荊州天崇寺僧智燈常持金剛經遇疾死弟子啟手足猶熱不即入木經七日却活云初見冥中若王者以念經故合掌降階因問訊言更容上人十年在世勉出生死又問人間眾僧中後食薏苡仁及藥食此大違本教燈報云律中有開遮條如何云此後人加之非佛意也今荊州僧眾中後無飲藥者王從貴妹公安潺陵林百姓王從貴妹未嫁常持金剛經貞元中忽暴疾卒埋已三日其家復廣記作覆墓聞塚中呻吟遂發視之果有氣輿歸數日能言云初至冥間冥吏以持經功德放還王從貴能治木常於公安靈化寺起造其寺禪師曙中常見從貴說左營伍伯韋南康鎮蜀時有左營伍伯於西山行營與同火卒學念金剛經性頑初一日讒得題目其夜堡外拾薪為蕃騎縛去行百餘里乃止天未明遂踣之於地以髮繫橛覆以駞罽寢其上此人惟念經題忽見金一鋋放光止於前試舉首動身所縛悉脫遂潛起逐金鋌走計行未得十餘里遲明不覺已至家家在府東市妻兒初疑其鬼具陳來由到家五六日行營將方申其逃初韋不信以逃日與至家日不差始免之陳昭元和初漢州孔目典陳昭因患病見一人著黃衣至牀前云趙判官喚爾昭問所因云至自冥間劉闢與竇懸對事要君為證昭即留坐逡巡又有一人手持一物如毬胞前吏恠其遲答之曰緣此候屠行開因笑謂昭曰君勿懼取生人氣須得猪胞君可面東側臥昭依其言不覺已隨二吏行路甚平可十餘里至一城大如府城甲士守門焉及入見一人怒容可駭即趙判官也語云劉闢收東川竇懸捕牛四十七頭送梓州稱准闢判殺闢又云先無牒君為孔目典合知事實未及對隔壁聞竇懸呼陳昭好在及問兄弟妻子存亡昭即欲參見冥吏云竇使君形容極惡不欲相見昭乃具說殺牛實奉劉尚書委曲非牒也紙是麻面見在漢州某司房架即令吏領昭至漢州取之門舘扄鎖乃於節竅中出入委曲至闢乃無言趙語昭爾自有一過知否竇懸所殺牛爾取一牛頭昭未及對趙曰此不同人間不可抵假須臾見一卒挈牛頭而至昭即恐懼求救趙令檢格合決一百考五十日因謂昭曰爾有何功德昭即自陳設若干人齋畵某像趙云此來生緣爾昭又言曾於表兄家轉金剛經趙曰可合掌請昭依言有頃見黃襥箱經自天而下住昭前昭取視即表兄所借本也有燒處尚在又令合掌其經即滅趙曰此足以免便放回復令昭往一司曰生祿檢其修短吏報云昭本名釗是金傍刀至某年改為昭更得十八年昭聞惆悵趙笑曰十八年大得作樂事何不悅乎乃令吏送昭至半道見一馬當路吏云此爾本屬可乘此即騎乃活死已一日半矣僧惟恭荊州法性寺僧惟恭三十餘年念金剛經日五十遍不拘僧儀好酒多是非為眾僧所惡後遇疾且死同寺有僧靈巋其迹類惟恭為一寺二害因他故出去寺一里逢五六人年少甚都衣服鮮潔各執樂器如龜茲部問靈巋惟恭上人何在靈巋即語其處疑其寺中有供也及晚回入寺聞鐘聲惟恭已死因說向來所見其日合寺聞絲竹聲竟無樂人入寺當時名僧云惟恭葢承經之力生不動國亦以其跡勉靈巋也靈巋感悟折節緇門董進朝董進朝元和中入軍初在軍時宿直城東樓上一夕月明忽見四人著黃從東來聚立城下說己姓名狀若追捕因相語曰董進朝常持金剛經以一分功德祝庇冥司我輩久蒙其惠如何殺之須枉命相代若此人他去我等無所賴矣其一人云董進朝對門有一人同姓同年壽限相埒可以代矣因忽不見進朝驚異之及明己聞對門復魂聲問其故死者父母云子昨宵暴卒進朝感泣說之因為殯塟供養其父母焉後出家法號慧通住興元唐安寺初陸其志於此有疑後識者云壽限相埒則非枉命其疑乃釋王沔元和中嚴司空綬在江陵時涔陽鎮將王沔常持金剛經因使歸州勘事回至咤灘船破五人同溺沔初入水若有人授竹一竿隨波出沒至下牢鎮著岸不死視手中物乃授持金剛經也咤灘至下牢三百餘里僧會宗長慶初荊州公安僧會宗姓蔡常中蠱得病骨立乃發願念金剛經以待盡至五十遍晝夢有人令開口喉中引出髮十餘莖夜又夢吐大螾長一肘餘因此遂愈荊山僧行堅見其事僧法正江陵開元寺般若院僧法正日持金剛經三七遍長慶初得病卒至冥司見若王者問師生平作何功德答曰常念金剛經乃揖上殿令登繡坐念經七遍侍衛悉合掌階下拷掠論對皆停息而聽念畢後遣一吏引還王下階送云上人更得三十年在人間勿廢讀誦因隨吏行數十里至一大坑吏因臨坑自後推之若隕空焉死已七日唯面不冷法正今尚在年八十餘荊州僧常靖親見其事沙彌道蔭石首縣有沙彌道蔭常持念金剛經寶曆初廣記云長慶因他出夜歸中路忽遇虎吼擲而前沙彌知不免乃閉目而坐但默念經心期救護虎遂伏草守之及曙村人來往虎乃去視其蹲處涎流於地王忠幹元和三年賊李同捷阻兵滄景帝命劉祐統齊德軍討之初圍德州城城堅不翌日又攻之自卯至未十傷八九竟不能拔時有齊州衙內八將官徤兒王忠幹博野人常念金剛經積二十餘年日數不闕其日忠幹上飛梯將及堞身中箭如蝟為櫑木擊落同火卒曳出羊馬城外置之水濠裏岸祐以暮夜命抽軍其時城下矢落如雨同火人匇忙忘取忠幹屍忠幹既死如夢至荒野遇大河欲渡無因仰天大哭忽聞人語聲忠幹見一人長丈餘疑其神人因求指營路其人云爾莫怕我令爾得渡此河忠幹拜之頭低未舉神人把腰擲之空中久方著地忽如夢覺聞賊城上交二更初不記過水亦不知瘡擡手捫面血塗眉睫方知傷損乃舉身強行百餘步却倒復見向人持刀叱曰起起忠幹驚懼遂走一里餘坐歇方聞本軍喝號聲遂及本營訪同火卒方知身死在水濠裏即夢中所過河也忠幹見在齊德軍何軫妻何軫鬻販為業妻劉氏少斷酒肉常持金剛經先焚香像前願年止四十五臨終心不亂先知死日至太和四年冬四十五矣悉捨資裝供僧欲入歲遍別親故何軫以為病魅不信至歲除日請僧授戒入關沐浴易衣獨處一室趺坐高聲念經及辨色悄然兒女排室入看之已卒頂熱灼手軫以僧禮塟塔在荊州北郭王殷蜀左營卒王殷常讀金剛經不茹葷飲酒為賞設庫子前後為人誤累合死者數四皆非意得免至太和四年郭釗司空鎮蜀郭性嚴急小不如意皆死王殷因呈綿纈郭嫌其惡弱令袒背將斃之郭有番狗隨郭臥起非使宅人逢之輒噬忽吠數聲立抱王殷背駈逐不去郭異之怒遂解趙安郭司空離蜀之年有百姓趙安常念金剛經因行野外見衣一樸遺墓側安以無主遂持還至家言於妻子隣人即告官趙盜物捕送縣賊曹怒其不承認以大關挾脛折三段後令杖脊杖下輒折吏意其有他術問之唯念金剛經及申郭郭亦異之判放及歸其妻云某日聞君經函中震裂數聲懼不敢發安乃馳視之帶斷軸折紙盡破裂安今見在王翰太和五年漢州什邡縣百姓王翰常在市日逐小利忽暴卒經三日却活云冥中有十六人同被追十五人散配他處翰獨至一司見一青衫少年稱是己姪為冥官廳子遂引見推典又云是己兄貌皆不相類其兄語云有冤牛一頭訴爾燒畬枉燒殺之爾又曾賣竹與殺狗人作箜篌殺狗兩頭狗亦訴爾爾今名未係死籍猶可以免為作何功德翰欲為設齋及寫法華經金光明經皆曰不可乃請曰持金剛經日七遍與之其兄喜曰足矣及活遂捨業出家今在什邡縣高涉太和七年冬給事中李公石為太原行軍司馬孔目官高涉因宿使院至鼕鼕鼓起時詣隣房忽遇一人長六尺餘呼曰行軍喚爾涉遂行行梢遲其人自後拓之不覺向北約行數十里至野外漸入一谷底後上一山至頂四望邑屋盡眼下至一曹司所追者呼云追高涉到其中人多衣朱綠當案者似崔行信郎中判云付司對復引出至一處數百人露坐與猪羊雜處領至一人前乃涉妹婿杜則也逆謂涉曰君初得書乎時作新人局遣某買羊四口記得否今被相債備甞苦毒涉遽云爾時祇使市肉非羊也則遂無言因見羊人立齧則逡巡被領他去倐忽又見一處露架方梁梁上釘大鐵環有數百人皆持刀以繩繫人頭牽入環中刳剔之涉懼走出但念金剛經倏忽逢舊相識楊演云李說尚書時杖殺賊李英道為劫賊事已於諸處受生三十年今却訴前事君常記得否涉辭以年幼不省又遇舊典段怡先與涉為義兄弟逢涉云先念金剛經莫廢忘否向來所見未是極苦處勉樹善業今得還乃經之力因送至家如夢死已經宿向所拓處數日青腫豐州烽子永泰初豐州烽子暮出為党項縛入西蕃易馬蕃將令穴肩骨貫以皮索以馬數百蹄配之經半歲馬息一倍蕃將賞以羊革數百因轉近牙帳贊普子愛其了事遂令執纛左右有剩肉餘酪與之又居半年因與酪肉悲泣不食贊普問之云有老母頻夜夢見贊普頗仁聞之悵然夜召帳中語云蕃法嚴無放還例我與爾馬有力者兩匹於某道縱爾歸無言我也烽子得馬極騁俱乏死遂晝潛夜走數日後為刺傷足倒磧中忽有風吹物窸窣過其前因攬之褁足有頃不復痛試起步走如故經信宿方及豐州界歸家母尚存悲喜曰自失爾我唯念金剛經寢食不廢以祈見爾今果其誓因取經拜之縫斷亡數幅不知其由子因道磧中傷足事毋令解足視之所褁瘡物乃數幅經也其瘡亦愈王孝廉大曆中太原偷馬賊誣一王孝廉同情拷掠旬日苦極強服推吏疑其冤未即具獄其人惟念金剛經其聲哀切晝夜不息忽一日有竹兩節墜獄中轉至於廣記作止其前他囚爭取之獄卒意藏刃破視內有字兩行云法尚應捨何況非法書蹟甚工賊首悲悔具承以匿嫌誣之廣記作舊嫌
